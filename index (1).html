<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RB19 Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #060608;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  canvas { display: block; }

  /* ── LOADING ── */
  #loader {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #060608;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  #loader-title {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 8px;
    text-transform: uppercase;
  }
  #loader-title span { color: #e8001d; }
  #loader-bar-wrap {
    width: 280px;
    height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  #loader-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #e8001d, #ff6b35);
    transition: width 0.3s ease;
  }
  #loader-pct {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
  }

  /* ── TOP HUD ── */
  #hud-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 20px 28px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(6,6,8,0.85) 0%, transparent 100%);
  }
  #title-block {}
  #title-main {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
    line-height: 1;
  }
  #title-main .red { color: #e8001d; }
  #title-sub {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.35);
    margin-top: 4px;
    font-family: 'Share Tech Mono', monospace;
  }
  #part-counter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 2px;
    text-align: right;
    line-height: 1.7;
  }

  /* ── BOTTOM HUD ── */
  #hud-bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 24px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to top, rgba(6,6,8,0.85) 0%, transparent 100%);
  }
  #hint {
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
  }
  #btn-explode {
    background: transparent;
    border: 1px solid rgba(232,0,29,0.6);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 12px 32px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  #btn-explode::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #e8001d;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: -1;
  }
  #btn-explode:hover::before { transform: translateX(0); }
  #btn-explode:hover { border-color: #e8001d; }
  #btn-explode.active { background: rgba(232,0,29,0.15); border-color: #e8001d; }

  #view-mode {
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
    text-align: right;
    min-width: 120px;
  }
  #view-mode span { color: #e8001d; }

  /* ── INFO PANEL ── */
  #info-panel {
    position: fixed;
    top: 0; right: -380px;
    width: 360px;
    height: 100vh;
    z-index: 20;
    background: rgba(8,8,12,0.97);
    border-left: 1px solid rgba(255,255,255,0.07);
    transition: right 0.35s cubic-bezier(0.16,1,0.3,1);
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(12px);
  }
  #info-panel.open { right: 0; }

  #panel-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    position: relative;
  }
  #panel-close {
    position: absolute;
    top: 24px; right: 20px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.3);
    font-size: 20px;
    cursor: pointer;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s;
  }
  #panel-close:hover { color: #fff; }
  #panel-category {
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
    display: inline-block;
    margin-bottom: 12px;
    font-weight: 400;
  }
  #panel-name {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 1px;
    line-height: 1.1;
  }

  #panel-body {
    padding: 24px;
    overflow-y: auto;
    flex: 1;
  }
  #panel-desc {
    font-size: 14px;
    font-weight: 300;
    line-height: 1.7;
    color: rgba(255,255,255,0.6);
    margin-bottom: 28px;
  }
  .spec-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    gap: 16px;
  }
  .spec-label {
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .spec-value {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    text-align: right;
  }

  /* ── HOVER LABEL ── */
  #hover-label {
    position: fixed;
    z-index: 15;
    pointer-events: none;
    background: rgba(8,8,12,0.9);
    border: 1px solid rgba(232,0,29,0.4);
    padding: 6px 12px;
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 2px;
    color: #fff;
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  #hover-label.visible { opacity: 1; }

  /* ── PART LABELS (exploded) ── */
  .part-label {
    position: fixed;
    z-index: 12;
    pointer-events: none;
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .part-label.visible { opacity: 1; }

  #overlay-svg {
    position: fixed;
    inset: 0;
    z-index: 11;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #overlay-svg.visible { opacity: 1; }

  @media (max-width: 600px) {
    #info-panel {
      width: 100vw;
      top: auto;
      bottom: -80vh;
      right: 0;
      height: 80vh;
      border-left: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      transition: bottom 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    #info-panel.open { bottom: 0; right: 0; }
  }
</style>
</head>

<div id="loader">
  <div id="loader-title"><span>RB</span>19</div>

<div id="hover-label"></div>

  <button id="btn-explode">+ EXPLODE</button>
  <div id="view-mode">MODE<br><span id="mode-text">ASSEMBLED</span></div>

const CATEGORY_COLORS = {
  AERODYNAMICS: { bg: 'rgba(0,80,200,0.2)', text: '#5599ff', border: 'rgba(0,100,255,0.4)' },
  SAFETY:       { bg: 'rgba(200,0,30,0.2)', text: '#ff5566', border: 'rgba(220,0,30,0.4)' },

// ── THREE.JS SETUP ──
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060608);
scene.fog = new THREE.Fog(0x060608, 15, 35);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(4, 2, 5);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.3));
const key = new THREE.DirectionalLight(0xffffff, 1.2);
key.position.set(5, 8, 5);
scene.add(key);
const fill = new THREE.DirectionalLight(0x8899ff, 0.5);
fill.position.set(-5, 3, -3);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xff4422, 0.3);
rim.position.set(0, -2, -6);
scene.add(rim);
const top = new THREE.DirectionalLight(0xffffff, 0.4);
top.position.set(0, 10, 0);
scene.add(top);

// OrbitControls — manual implementation (lightweight)
let isDragging = false, prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0.5, phi: 1.1, radius: 7 };
let targetSpherical = { ...spherical };

function applyCamera() {
  camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = spherical.radius * Math.cos(spherical.phi);
  camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(0, 0.3, 0);
}

renderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
renderer.domElement.addEventListener('mouseup', () => isDragging = false);
renderer.domElement.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
  targetSpherical.theta -= dx * 0.005;
  targetSpherical.phi = Math.max(0.2, Math.min(Math.PI - 0.1, targetSpherical.phi + dy * 0.005));
  prevMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('wheel', e => {
  targetSpherical.radius = Math.max(1.5, Math.min(15, targetSpherical.radius + e.deltaY * 0.005));
});

// Touch
let lastTouch = null, lastPinch = null;
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.touches.length === 2) lastPinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
});
renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && lastTouch) {
    const dx = e.touches[0].clientX - lastTouch.x, dy = e.touches[0].clientY - lastTouch.y;
    targetSpherical.theta -= dx * 0.006;
    targetSpherical.phi = Math.max(0.2, Math.min(Math.PI - 0.1, targetSpherical.phi + dy * 0.006));
    lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  if (e.touches.length === 2 && lastPinch) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    targetSpherical.radius = Math.max(1.5, Math.min(15, targetSpherical.radius - (d - lastPinch) * 0.02));
    lastPinch = d;
  }
}, { passive: false });

// ── MODEL LOADING ──
let model = null;
let meshGroups = {}; // partKey → [mesh, ...]
let explodedOffsets = {}; // partKey → THREE.Vector3
let isExploded = false;
let animating = false;
const originalPositions = {}; // mesh.uuid → original world position offset

const loader = new THREE.FileLoader();
loader.setResponseType('arraybuffer');

// Use GLTFLoader via dynamic script
const gltfScript = document.createElement('script');
gltfScript.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
document.head.appendChild(gltfScript);

gltfScript.onload = () => {
  const gltfLoader = new THREE.GLTFLoader();
  const modelUrl = 'https://anshifmhd.github.io/f1-explorer/rb19.glb';

  gltfLoader.load(modelUrl, (gltf) => {
    model = gltf.scene;

    // Centre and scale
    const box = new THREE.Box3().setFromObject(model);
    const centre = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 4 / maxDim;
    model.scale.setScalar(scale);
    model.position.sub(centre.multiplyScalar(scale));
    model.position.y -= box.min.y * scale * 0.5;

    scene.add(model);

    // Map meshes by parent name
    let totalMeshes = 0;
    model.traverse(obj => {
      if (obj.isMesh) {
        totalMeshes++;
        const parentName = obj.parent ? obj.parent.name : '';
        const partKey = PARENT_MAP[parentName];
        if (partKey) {
          if (!meshGroups[partKey]) meshGroups[partKey] = [];
          meshGroups[partKey].push(obj);
          obj.userData.partKey = partKey;
          // Store original material
          obj.userData.origMaterial = obj.material.clone ? obj.material.clone() : obj.material;
        }
      }
    });

    document.getElementById('cnt-mapped').textContent = Object.keys(meshGroups).length;
    document.getElementById('cnt-total').textContent = totalMeshes;

    // Compute explode offsets per part (centroid → direction from car centre)
    const carCentre = new THREE.Vector3();
    Object.entries(meshGroups).forEach(([key, meshes]) => {
      const groupBox = new THREE.Box3();
      meshes.forEach(m => groupBox.expandByObject(m));
      const groupCentre = groupBox.getCenter(new THREE.Vector3());
      explodedOffsets[key] = groupCentre.clone().sub(carCentre).normalize().multiplyScalar(1.8);
    });

    document.getElementById('loader').style.opacity = '0';
    setTimeout(() => document.getElementById('loader').style.display = 'none', 500);

  }, (prog) => {
    const pct = Math.round((prog.loaded / prog.total) * 100);
    document.getElementById('loader-bar').style.width = pct + '%';
    document.getElementById('loader-pct').textContent = `LOADING MODEL — ${pct}%`;
  }, (err) => {
    document.getElementById('loader-pct').textContent = 'ERROR LOADING MODEL';
    console.error(err);
  });
};

// ── EXPLODE / ASSEMBLE ──
const clock = new THREE.Clock();
let explodeT = 0; // 0=assembled, 1=exploded
let explodeDir = 0; // 1=exploding, -1=assembling

function triggerExplode() {
  if (animating) return;
  isExploded = !isExploded;
  explodeDir = isExploded ? 1 : -1;
  animating = true;
  const btn = document.getElementById('btn-explode');
  const mode = document.getElementById('mode-text');
  if (isExploded) {
    btn.textContent = '— ASSEMBLE';
    btn.classList.add('active');
    mode.textContent = 'EXPLODED';
  } else {
    btn.textContent = '+ EXPLODE';
    btn.classList.remove('active');
    mode.textContent = 'ASSEMBLED';
  }
}

document.getElementById('btn-explode').addEventListener('click', triggerExplode);

// ── RAYCASTING ──
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-9999, -9999);
const hoverLabel = document.getElementById('hover-label');
let hoveredKey = null;
let mouseDownPos = null;

renderer.domElement.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  hoverLabel.style.left = (e.clientX + 16) + 'px';
  hoverLabel.style.top = (e.clientY - 10) + 'px';
});

renderer.domElement.addEventListener('mousedown', e => {
  mouseDownPos = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mouseup', e => {
  if (!mouseDownPos) return;
  const dx = e.clientX - mouseDownPos.x, dy = e.clientY - mouseDownPos.y;
  if (Math.sqrt(dx*dx+dy*dy) < 5) handleClick();
  mouseDownPos = null;
});

renderer.domElement.addEventListener('touchend', e => {
  if (e.changedTouches.length === 1) {
    const t = e.changedTouches[0];
    mouse.x = (t.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(t.clientY / window.innerHeight) * 2 + 1;
    handleClick();
  }
});

function handleClick() {
  if (!model) return;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(model.children, true);
  if (hits.length > 0) {
    const obj = hits[0].object;
    const key = obj.userData.partKey;
    if (key && PARTS[key]) { showPanel(key); return; }
  }
  closePanel();
}

// ── INFO PANEL ──
function showPanel(key) {
  const part = PARTS[key];
  const cat = CATEGORY_COLORS[part.category] || CATEGORY_COLORS.CHASSIS;
  const panel = document.getElementById('info-panel');
  const catEl = document.getElementById('panel-category');
  catEl.textContent = part.category;
  catEl.style.background = cat.bg;
  catEl.style.color = cat.text;
  catEl.style.border = '1px solid ' + cat.border;
  document.getElementById('panel-name').textContent = part.name;
  document.getElementById('panel-desc').textContent = part.desc;
  const specsEl = document.getElementById('panel-specs');
  specsEl.innerHTML = part.specs.map(([l, v]) =>
    `<div class="spec-row"><span class="spec-label">${l}</span><span class="spec-value">${v}</span></div>`
  ).join('');
  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('open');
}

document.getElementById('panel-close').addEventListener('click', closePanel);

// ── HIGHLIGHT ──
function setHighlight(key, on) {
  if (!meshGroups[key]) return;
  meshGroups[key].forEach(m => {
    if (!m.material) return;
    if (on) {
      if (!m.userData.origEmissive) m.userData.origEmissive = m.material.emissive ? m.material.emissive.clone() : new THREE.Color(0,0,0);
      if (m.material.emissive) m.material.emissive.set(0xff6b00);
      if (m.material.emissiveIntensity !== undefined) m.material.emissiveIntensity = 0.4;
    } else {
      if (m.material.emissive && m.userData.origEmissive) m.material.emissive.copy(m.userData.origEmissive);
      if (m.material.emissiveIntensity !== undefined) m.material.emissiveIntensity = 0;
    }
  });
}

// ── ANIMATE LOOP ──
const EXPLODE_DURATION = 1.5;

function animate() {
  requestAnimationFrame(animate);

  // Smooth camera
  spherical.theta += (targetSpherical.theta - spherical.theta) * 0.08;
  spherical.phi += (targetSpherical.phi - spherical.phi) * 0.08;
  spherical.radius += (targetSpherical.radius - spherical.radius) * 0.08;
  applyCamera();

  // Explode animation
  if (animating && model) {
    const dt = clock.getDelta();
    explodeT = Math.max(0, Math.min(1, explodeT + explodeDir * dt / EXPLODE_DURATION));
    const t = easeInOut(explodeT);

    Object.entries(meshGroups).forEach(([key, meshes]) => {
      const offset = explodedOffsets[key];
      if (!offset) return;
      meshes.forEach(m => {
        if (!m.userData.basePos) m.userData.basePos = m.position.clone();
        m.position.copy(m.userData.basePos).addScaledVector(offset, t);
      });
    });

    if (explodeT === 0 || explodeT === 1) animating = false;

    // Show/hide labels
    const labelsVisible = explodeT > 0.7;
    document.getElementById('overlay-svg').classList.toggle('visible', labelsVisible);
    document.querySelectorAll('.part-label').forEach(el => el.classList.toggle('visible', labelsVisible));
    if (labelsVisible) updateLabels();
  }

  // Hover raycasting
  if (model) {
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(model.children, true);
    let newKey = null;
    if (hits.length > 0) {
      newKey = hits[0].object.userData.partKey || null;
    }
    if (newKey !== hoveredKey) {
      if (hoveredKey) { setHighlight(hoveredKey, false); }
      hoveredKey = newKey;
      if (hoveredKey && PARTS[hoveredKey]) {
        setHighlight(hoveredKey, true);
        hoverLabel.textContent = PARTS[hoveredKey].name.toUpperCase();
        hoverLabel.classList.add('visible');
        renderer.domElement.style.cursor = 'pointer';
      } else {
        hoverLabel.classList.remove('visible');
        renderer.domElement.style.cursor = 'default';
      }
    }
  }

  renderer.render(scene, camera);
}

function easeInOut(t) {
  return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
}

// ── FLOATING LABELS ──
function ensureLabels() {
  const existing = new Set(document.querySelectorAll('.part-label').length);
  const labelKeys = ['FWING','RWING','HALO','BODY','EXHAUST','GEARBOX','FONDPLAT','PAREBRISE','STEER','SIDE_CAM','ANTENNE','LF_INT','LR_INT','RF_INT','RR_INT','_cockpit'];
  labelKeys.forEach(key => {
    if (document.getElementById('lbl-' + key)) return;
    const el = document.createElement('div');
    el.className = 'part-label';
    el.id = 'lbl-' + key;
    el.textContent = PARTS[key] ? PARTS[key].name.toUpperCase() : key;
    document.body.appendChild(el);
  });
}

function updateLabels() {
  ensureLabels();
  const svg = document.getElementById('overlay-svg');
  svg.innerHTML = '';
  const labelKeys = ['FWING','RWING','HALO','BODY','EXHAUST','GEARBOX','FONDPLAT','PAREBRISE','STEER','SIDE_CAM','ANTENNE','LF_INT','LR_INT','RF_INT','RR_INT','_cockpit'];

  labelKeys.forEach(key => {
    const meshes = meshGroups[key];
    if (!meshes || meshes.length === 0) return;
    const box = new THREE.Box3();
    meshes.forEach(m => box.expandByObject(m));
    const centre = box.getCenter(new THREE.Vector3());
    const projected = centre.project(camera);
    const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;
    if (projected.z > 1) return;

    const lbl = document.getElementById('lbl-' + key);
    if (!lbl) return;
    const lx = x + 30, ly = y - 10;
    lbl.style.left = lx + 'px';
    lbl.style.top = ly + 'px';

    // SVG connector line
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x); line.setAttribute('y1', y);
    line.setAttribute('x2', lx); line.setAttribute('y2', ly + 8);
    line.setAttribute('stroke', 'rgba(255,255,255,0.15)');
    line.setAttribute('stroke-width', '0.5');
    svg.appendChild(line);
  });
}

// ── RESIZE ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

clock.getDelta(); // init clock
animate();
</script>
